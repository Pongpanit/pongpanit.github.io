<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>สเต็กเด็กแนว - ยินดีต้อนรับ</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style1.css" />

    <script>
      window.onload = function () {
        const urlParams = new URLSearchParams(window.location.search);
        const tableParam = urlParams.get("table");

        if (tableParam) {
          // 1. บันทึกเลขโต๊ะลงในความจำเครื่อง (LocalStorage) ทันทีที่สแกน
          localStorage.setItem("selectedTable", tableParam);

          // 2. อัปเดตปุ่ม "สั่งอาหาร" ให้ส่งเลขโต๊ะไปด้วย (เพื่อความชัวร์ 2 ชั้น)
          const orderBtn = document.querySelector(".main-btn");
          if (orderBtn) {
            orderBtn.href = "order.html?table=" + tableParam;
          }
        }
      };
    </script>
  </head>
  <body>
    <div class="hero">
      <div class="content">
        <a href="order.html" class="main-btn"> สั่งอาหาร </a>
      </div>
    </div>
  </body>
</html>
