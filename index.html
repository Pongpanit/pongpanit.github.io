<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>สเต็กเด็กแนว สาขาสนามฟุตบอลไพรมารี่ ปลวกแดง</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  </head>
  <body>
    <header>
      <h1>สเต็กเด็กแนว สาขาสนามฟุตบอลไพรมารี่ ปลวกแดง</h1>
      <div class="lang-buttons">
        <button onclick="setLanguage('th')">ไทย</button>
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('zh')">中文</button>
      </div>
    </header>

    <div id="posContainer" class="container">
      <div class="menu"></div>

      <div id="cartDiv" class="cart">
        <h2>ตะกร้าสินค้า</h2>
        <div id="cartItems"></div>

        <p class="total">รวมทั้งหมด: <span id="total">0</span> บาท</p>

        <div class="order-note-box">
          <label id="orderNoteLabel">หมายเหตุถึงครัว</label>
          <textarea id="orderNoteInput"></textarea>
        </div>

        <button id="orderBtn" onclick="orderFood()">สั่งอาหาร</button>
      </div>
    </div>

    <div id="receiptDiv" class="receipt" style="display: none">
      <div class="receipt-header">
        <h2 id="receiptTitleText">ใบเสร็จ</h2>
        <p>
          <span id="tableLabelText">เลขโต๊ะ</span>:
          <span id="tableNumber"></span>
        </p>
      </div>

      <div class="receipt-body">
        <div id="receiptItems"></div>
      </div>

      <div class="receipt-footer">
        <div
          id="receiptNoteDisplay"
          class="receipt-note"
          style="
            display: none;
            text-align: left;
            background: #fff3e0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            color: #e65100;
            font-size: 0.9rem;
          "
        ></div>
        <div class="receipt-summary">
          <div class="receipt-total">
            <span id="totalLabelText">รวมสุทธิ</span>:
            <span id="grandTotal">0</span> บาท
          </div>
        </div>
        <div
          id="qrcode"
          style="margin: 0 auto 15px; display: flex; justify-content: center"
        ></div>
        <div style="display: flex; gap: 10px; justify-content: center">
          <button id="backBtn" onclick="backToPOS()">กลับเมนู</button>
          <button
            onclick="window.print()"
            style="background: #4caf50; color: white"
          >
            พิมพ์ใบเสร็จ
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
